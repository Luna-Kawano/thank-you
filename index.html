<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>tuna kawano</title>
  <meta name="color-scheme" content="only light">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #fff;
      color: #000;
      font-family: 'Courier Prime', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      padding: 40px 24px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .logo {
      width: 120px;
      max-width: 40vw;
    }

    .tap-label {
      font-size: 16px;
      opacity: 0.7;
    }

    .shop-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Courier Prime', monospace;
      font-size: 14px;
      color: #000;
      background: none;
      border: 1px solid #000;
      padding: 7px 14px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: background 0.15s, color 0.15s;
    }

    .shop-btn:hover {
      background: #000;
      color: #fff;
    }


  </style>
</head>
<body>
  <div class="container">
    <img src="tuna_logo.svg" alt="tuna kawano" class="logo">
    <p class="tap-label">Tap anywhere for a little voice note :)</p>
    <a href="https://tunakawano.com" class="shop-btn" target="_blank" rel="noopener" id="shopBtn">
      SHOP &amp; GALLERY →
    </a>
  </div>

  <audio id="audio" src="thank_you_message.m4a"></audio>

  <script>
    document.body.addEventListener('click', (e) => {
      if (e.target.closest('#shopBtn')) return;
      document.getElementById('audio').play();
    }, { once: true });
  </script>
</body>
</html>
