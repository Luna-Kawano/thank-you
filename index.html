<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>tuna kawano</title>
  <meta name="color-scheme" content="only light">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #fff;
      color: #000;
      font-family: 'Courier Prime', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      padding: 40px 24px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .logo {
      width: 120px;
      max-width: 40vw;
    }

    .tap-label {
      font-size: 16px;
      opacity: 0.7;
    }

    .player {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 200px;
    }

    .player.active { display: flex; }
    .tap-label.hidden { display: none; }

    .progress-track {
      width: 100%;
      height: 1px;
      background: #ddd;
    }

    .progress-fill {
      height: 1px;
      background: #000;
      width: 0%;
    }

    .player-label {
      font-size: 13px;
      opacity: 0.5;
      letter-spacing: 0.05em;
    }

    .shop-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Courier Prime', monospace;
      font-size: 14px;
      color: #000;
      background: none;
      border: 1px solid #000;
      padding: 7px 14px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: background 0.15s, color 0.15s;
    }

    .shop-btn:hover {
      background: #000;
      color: #fff;
    }


  </style>
</head>
<body>
  <div class="container">
    <img src="tuna_logo.svg" alt="tuna kawano" class="logo">
    <p class="tap-label" id="tapLabel">Tap anywhere for a little voice note :)</p>
    <div class="player" id="player">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="player-label" id="playerLabel">playing...</span>
    </div>
    <a href="https://tunakawano.com" class="shop-btn" target="_blank" rel="noopener" id="shopBtn">
      SHOP &amp; GALLERY →
    </a>
  </div>

  <audio id="audio" src="thank_you_message.m4a"></audio>

  <script>
    const audio       = document.getElementById('audio');
    const tapLabel    = document.getElementById('tapLabel');
    const player      = document.getElementById('player');
    const playerLabel = document.getElementById('playerLabel');
    const progressFill = document.getElementById('progressFill');

    function startPlayback() {
      audio.currentTime = 0;
      audio.play();
      tapLabel.classList.add('hidden');
      player.classList.add('active');
      playerLabel.textContent = 'playing...';
      progressFill.style.width = '0%';
    }

    document.body.addEventListener('click', (e) => {
      if (e.target.closest('#shopBtn')) return;
      startPlayback();
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    });

    audio.addEventListener('ended', () => {
      player.classList.remove('active');
      tapLabel.classList.remove('hidden');
    });
  </script>
</body>
</html>
