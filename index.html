<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Message</title>
</head>
<body style="margin:0; background:white; display:flex; align-items:center; justify-content:center; height:100vh;">

  <p style="font-family:system-ui; font-size:16px; opacity:0.7;">
    Tap anywhere for a little note :)
  </p>

  <audio id="audio" src="thank_you_message.m4a"></audio>

  <script>
    document.body.addEventListener('click', () => {
      document.getElementById('audio').play();
    }, { once: true });
  </script>

</body>
</html>
