<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Message</title>
</head>

<body style="
  margin:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
  cursor:pointer;
">

  <div>
    <img 
      src="tuna_logo_circle.png.png" 
      alt="Logo"
      style="
        width:120px;
        max-width:40vw;
        margin-bottom:20px;
        opacity:0.9;
      "
    >

    <p style="
      font-family:system-ui;
      font-size:16px;
      opacity:0.7;
      margin:0;
    ">
      Tap anywhere for a little voice note :)
    </p>
  </div>

  <audio id="audio" src="thank_you_message.m4a"></audio>

  <script>
    document.body.addEventListener('click', () => {
      document.getElementById('audio').play();
    }, { once: true });
  </script>

</body>
</html>
